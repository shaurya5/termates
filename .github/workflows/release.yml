name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Run the same sanity checks before packaging
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: npm ci
      - run: npm test

  package-mac:
    name: Package (macOS)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false # skip code signing in CI
      - uses: actions/upload-artifact@v4
        with:
          name: termates-mac
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  package-linux:
    name: Package (Linux)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:linux
      - uses: actions/upload-artifact@v4
        with:
          name: termates-linux
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error
