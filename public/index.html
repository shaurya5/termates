<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Termates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/vendor/xterm/css/xterm.css">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">Termates</span>
        </div>
      </div>

      <!-- Workspace Tabs -->
      <div class="sidebar-section ws-section">
        <div class="section-header">
          <span class="section-title">Workspaces</span>
          <div class="section-actions">
            <button id="btn-new-workspace" class="icon-btn" title="New Workspace (Ctrl+Shift+N)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button id="btn-delete-workspace" class="icon-btn" title="Delete Workspace">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>
        <div id="workspace-tabs" class="ws-tabs"></div>
      </div>

      <!-- Terminals in active workspace -->
      <div class="sidebar-section">
        <div class="section-header">
          <span class="section-title">Terminals</span>
          <div class="section-actions">
            <button id="btn-new-terminal" class="icon-btn" title="New Terminal (Ctrl+Shift+T)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>
        <ul id="terminal-list" class="panel-list"></ul>
      </div>

      <div class="sidebar-section">
        <div class="section-header">
          <span class="section-title">Links</span>
          <div class="section-actions">
            <button id="btn-link-mode" class="icon-btn" title="Link terminals">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            </button>
          </div>
        </div>
        <ul id="link-list" class="panel-list"></ul>
      </div>

      <div class="sidebar-section">
        <div class="section-header">
          <span class="section-title">Messages</span>
          <div class="section-actions">
            <button id="btn-compose-message" class="icon-btn" title="Send to linked terminal (Ctrl+Shift+M)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </button>
          </div>
        </div>
        <ul id="message-list" class="panel-list message-list"></ul>
      </div>

      <!-- Workspace info panel -->
      <div id="ws-info" class="ws-info"></div>

      <div class="sidebar-footer">
        <div class="footer-info" id="version-info">v1.2.2</div>
      </div>

      <!-- Update banner at very bottom -->
      <div id="update-banner" class="update-banner hidden">
        <div class="update-text">
          <span id="update-message">Update available</span>
        </div>
        <button id="update-action" class="update-btn">Update</button>
      </div>
    </aside>

    <main id="main-content">
      <div id="toolbar">
        <div class="toolbar-left">
          <button id="btn-split-h" class="toolbar-btn" title="Split Horizontal">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
            <span>Split H</span>
          </button>
          <button id="btn-split-v" class="toolbar-btn" title="Split Vertical">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
            <span>Split V</span>
          </button>
          <div class="toolbar-separator"></div>
          <button id="btn-toggle-browser" class="toolbar-btn" title="Toggle Browser (Ctrl+Shift+B)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span>Browser</span>
          </button>
        </div>
        <div class="toolbar-right">
          <span id="active-terminal-name" class="active-name"></span>
        </div>
      </div>

      <div id="workspace">
        <div id="terminal-area">
          <div id="layout-root"></div>
        </div>
        <div id="browser-resize-handle" class="hidden"></div>
        <div id="browser-panel" class="hidden">
          <div class="browser-tab-bar">
            <div id="browser-tabs" class="browser-tabs"></div>
            <button id="btn-add-browser-tab" class="browser-tab-add" title="New tab">+</button>
            <button id="btn-close-browser" class="browser-tab-close" title="Close browser panel">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div class="browser-url-row">
            <button id="browser-back" class="browser-nav-btn" title="Back">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button id="browser-fwd" class="browser-nav-btn" title="Forward">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
            <button id="browser-refresh" class="browser-nav-btn" title="Refresh">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            </button>
            <input id="browser-url" class="browser-url-bar" type="text" placeholder="Enter URL...">
          </div>
          <div id="browser-content" class="browser-frame-container">
            <div class="browser-empty">Enter a URL to browse</div>
          </div>
        </div>
      </div>
    </main>

    <div id="notifications"></div>

    <div id="link-mode-overlay" class="hidden">
      <div class="overlay-banner">
        LINK MODE: Click two terminals to connect them
        <button id="btn-cancel-link" class="cancel-btn">Cancel (Esc)</button>
      </div>
    </div>

    <dialog id="send-dialog">
      <div class="dialog-header">Send to Linked Terminal</div>
      <div class="dialog-body">
        <label for="send-source">From:</label>
        <select id="send-source"></select>
        <label for="send-target">Target Terminal:</label>
        <select id="send-target"></select>
        <label for="send-text">Message:</label>
        <textarea id="send-text" rows="4" placeholder="Enter command or message to send..."></textarea>
        <label class="checkbox-label"><input id="send-with-enter" type="checkbox" checked> Press Enter after sending</label>
      </div>
      <div class="dialog-footer">
        <button id="send-cancel" class="btn btn-secondary">Cancel</button>
        <button id="send-confirm" class="btn btn-primary">Send</button>
      </div>
    </dialog>

    <dialog id="create-dialog">
      <div class="dialog-header">New Terminal</div>
      <div class="dialog-body">
        <label for="create-name">Name:</label>
        <input id="create-name" type="text" placeholder="e.g. Agent Coder">
        <label for="create-role">Role (optional):</label>
        <select id="create-role">
          <option value="">None</option>
          <option value="lead">Lead</option>
          <option value="coder">Coder</option>
          <option value="reviewer">Reviewer</option>
          <option value="tester">Tester</option>
          <option value="researcher">Researcher</option>
          <option value="devops">DevOps</option>
        </select>
        <label for="create-cwd">Working Directory:</label>
        <div style="display:flex;gap:6px">
          <input id="create-cwd" type="text" placeholder="Leave empty for home directory" style="flex:1">
          <button id="create-cwd-browse" class="btn btn-secondary" type="button" style="padding:4px 10px;font-size:11px">Browse</button>
        </div>
      </div>
      <div class="dialog-footer">
        <button id="create-cancel" class="btn btn-secondary">Cancel</button>
        <button id="create-confirm" class="btn btn-primary">Create</button>
      </div>
    </dialog>

    <!-- New Workspace Dialog -->
    <dialog id="ws-dialog">
      <div class="dialog-header">New Workspace</div>
      <div class="dialog-body">
        <label for="ws-name">Name:</label>
        <input id="ws-name" type="text" placeholder="e.g. My Project">
        <label for="ws-type">Type:</label>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="ws-type" value="local" checked> Local</label>
          <label class="radio-label"><input type="radio" name="ws-type" value="remote"> Remote (SSH)</label>
        </div>
        <div id="ws-local-fields">
          <label for="ws-cwd">Working Directory:</label>
          <div style="display:flex;gap:6px">
            <input id="ws-cwd" type="text" placeholder="Leave empty for home directory" style="flex:1">
            <button id="ws-cwd-browse" class="btn btn-secondary" type="button" style="padding:4px 10px;font-size:11px">Browse</button>
          </div>
        </div>
        <div id="ws-ssh-fields" class="hidden">
          <label for="ws-ssh-target">SSH Target:</label>
          <div class="input-with-btn">
            <input id="ws-ssh-target" type="text" placeholder="user@hostname" list="ssh-hosts-list">
            <datalist id="ssh-hosts-list"></datalist>
          </div>
          <label for="ws-remote-cwd">Remote Working Directory:</label>
          <input id="ws-remote-cwd" type="text" placeholder="e.g. /home/user/project">
        </div>
      </div>
      <div class="dialog-footer">
        <button id="ws-cancel" class="btn btn-secondary">Cancel</button>
        <button id="ws-confirm" class="btn btn-primary">Create Workspace</button>
      </div>
    </dialog>

    <dialog id="edit-dialog">
      <div class="dialog-header">Configure Terminal</div>
      <div class="dialog-body">
        <input id="edit-id" type="hidden">
        <label for="edit-name">Name:</label>
        <input id="edit-name" type="text" placeholder="Terminal name">
        <label for="edit-role">Role:</label>
        <select id="edit-role">
          <option value="">None</option>
          <option value="lead">Lead</option>
          <option value="coder">Coder</option>
          <option value="reviewer">Reviewer</option>
          <option value="tester">Tester</option>
          <option value="researcher">Researcher</option>
          <option value="devops">DevOps</option>
        </select>
        <label for="edit-status">Status:</label>
        <select id="edit-status">
          <option value="idle">Idle</option>
          <option value="attention">Attention</option>
          <option value="success">Success</option>
          <option value="warning">Warning</option>
          <option value="error">Error</option>
        </select>
      </div>
      <div class="dialog-footer">
        <button id="edit-delete" class="btn btn-danger">Delete Terminal</button>
        <div style="flex:1"></div>
        <button id="edit-cancel" class="btn btn-secondary">Cancel</button>
        <button id="edit-confirm" class="btn btn-primary">Save</button>
      </div>
    </dialog>
  </div>

  <script src="/dist/bundle.js"></script>
</body>
</html>
